<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Accept your invitation · SOAR</title>
    <meta name="description" content="Join your team's workspace on SOAR." />

  <body class="invite-body">
    <main class="invite-shell">
      <a class="invite-brand" href="/">SOAR</a>

      <p class="invite-foot">
        Trouble signing up? Email <a href="mailto:hello@soar-crm.com">hello@soar-crm.com</a>.
      </p>
    </main>
    <script type="module" src="/src/invite.ts"></script>
